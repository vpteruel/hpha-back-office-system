version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: poc-bunjs-backend
    ports:
      - "5000:5000"
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./packages/shared:/app/packages/shared
    environment:
      - NODE_ENV=development
    command: bun run --watch src/index.ts
    networks:
      - poc-bunjs-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: builder
    container_name: poc-bunjs-frontend
    ports:
      - "3000:5173"
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
      - ./apps/frontend/index.html:/app/apps/frontend/index.html
      - ./apps/frontend/vite.config.ts:/app/apps/frontend/vite.config.ts
      - ./packages/shared:/app/packages/shared
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000
    command: bun run dev --host 0.0.0.0
    networks:
      - poc-bunjs-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  poc-bunjs-network:
    driver: bridge
